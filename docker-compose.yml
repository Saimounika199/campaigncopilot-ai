version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: resume-postgres
    environment:
      POSTGRES_USER: hackuser
      POSTGRES_PASSWORD: hackpass
      POSTGRES_DB: resumes
    ports:
      - "5432:5432"

  qdrant:
    image: qdrant/qdrant:latest
    container_name: resume-qdrant
    ports:
      - "6333:6333"

  redis:
    image: redis:7-alpine
    container_name: resume-redis
    ports:
      - "6379:6379"
